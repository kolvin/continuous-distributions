name: Benchmarks

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Run benchmarks
        run: dotnet run --project Distributions.Benchmarks --configuration Release

      - name: Write results to summary
        run: cat BenchmarkDotNet.Artifacts/results/*-report-github.md >> "$GITHUB_STEP_SUMMARY"

      - name: Ensure gh-pages branch exists
        run: |
          git fetch origin gh-pages:gh-pages 2>/dev/null || (
            git checkout --orphan gh-pages &&
            git rm -rf . &&
            git commit --allow-empty -m "chore: initialise gh-pages" &&
            git push origin gh-pages &&
            git checkout main
          )

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: benchmarkdotnet
          output-file-path: BenchmarkDotNet.Artifacts/results/Distributions.Benchmarks.PdfBenchmarks-report-full.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks
          alert-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: false
