name: .NET Build

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Lint
        run: dotnet format --verify-no-changes --severity warn --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory coverage

      - name: Coverage summary
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool --verbosity quiet
          reportgenerator -reports:"coverage/**/coverage.cobertura.xml" -targetdir:"coverage/report" -reporttypes:MarkdownSummaryGithub
          cat coverage/report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
